<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with AI</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/main.js"></script>
</head>
<body>
    <header>
        <h1>Mental Health Chatbot</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/chat" class="active">Chat</a>
        <a href="/profile">Profile</a>
        <a href="/resources">Resources</a>
        <a href="/about">About</a>
    </nav>
    <main class="container">
        <div class="card">
            <h1>Chat with our AI</h1>
            <div id="chat-box" class="border p-3 mb-3" style="height: 300px; overflow-y: scroll;">
                <!-- Chat messages will appear here -->
            </div>
            <div class="input-group">
                <input type="text" id="chat-input" class="form-control" placeholder="Type your message...">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 Mental Health Chatbot</p>
    </footer>
    <script>
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value;
            if (message.trim() === '') return;
            const chatBox = document.getElementById('chat-box');
            const userMessage = `<div class='text-right'><strong>You:</strong> ${message}</div>`;
            chatBox.innerHTML += userMessage;
            input.value = '';
            // Mock AI response
            setTimeout(() => {
                const aiMessage = `<div class='text-left'><strong>AI:</strong> Thank you for sharing. How can I assist you further?</div>`;
                chatBox.innerHTML += aiMessage;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
